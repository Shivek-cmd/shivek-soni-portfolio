<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Dashboard frame -->
  <rect x="50" y="25" width="300" height="190" rx="14" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="50" y="25" width="300" height="35" rx="14" fill="url(#g1)" opacity="0.1"/>
  <circle cx="72" cy="42" r="5" fill="url(#g1)" opacity="0.3"/>
  <circle cx="90" cy="42" r="5" fill="url(#g1)" opacity="0.2"/>
  <circle cx="108" cy="42" r="5" fill="url(#g1)" opacity="0.15"/>
  <!-- KPI cards row -->
  <rect x="65" y="70" width="80" height="45" rx="8" fill="url(#g1)" opacity="0.08"/>
  <text x="105" y="88" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">$24.5K</text>
  <text x="105" y="103" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="7">Revenue</text>
  <rect x="160" y="70" width="80" height="45" rx="8" fill="url(#g1)" opacity="0.08"/>
  <text x="200" y="88" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">68%</text>
  <text x="200" y="103" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="7">Conversion</text>
  <rect x="255" y="70" width="80" height="45" rx="8" fill="url(#g1)" opacity="0.08"/>
  <text x="295" y="88" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">1,247</text>
  <text x="295" y="103" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="7">Leads</text>
  <!-- Chart area -->
  <polyline points="75,185 110,170 140,175 170,155 200,145 230,150 260,130 290,125 320,135" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Chart area fill -->
  <polygon points="75,185 110,170 140,175 170,155 200,145 230,150 260,130 290,125 320,135 320,195 75,195" fill="url(#g1)" opacity="0.08"/>
  <!-- Chart dots -->
  <circle cx="110" cy="170" r="3" fill="url(#g1)" opacity="0.6"/>
  <circle cx="170" cy="155" r="3" fill="url(#g1)" opacity="0.6"/>
  <circle cx="230" cy="150" r="3" fill="url(#g1)" opacity="0.6"/>
  <circle cx="290" cy="125" r="3" fill="url(#g1)" opacity="0.6"/>
  <!-- Grid lines -->
  <line x1="75" y1="195" x2="320" y2="195" stroke="#9CA3AF" stroke-width="0.5" opacity="0.2"/>
  <line x1="75" y1="175" x2="320" y2="175" stroke="#9CA3AF" stroke-width="0.3" opacity="0.1" stroke-dasharray="3 3"/>
  <line x1="75" y1="155" x2="320" y2="155" stroke="#9CA3AF" stroke-width="0.3" opacity="0.1" stroke-dasharray="3 3"/>
  <line x1="75" y1="135" x2="320" y2="135" stroke="#9CA3AF" stroke-width="0.3" opacity="0.1" stroke-dasharray="3 3"/>
</svg>
