  <text x="165" y="184" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="9" opacity="0.6">2.4K</text>
  <text x="215" y="184" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="9" opacity="0.6">847</text>
  <text x="245" y="184" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="9" opacity="0.6">156</text>
  <!-- Platform icons - left side -->
  <circle cx="60" cy="60" r="20" fill="#161619" stroke="url(#g1)" stroke-width="1" opacity="0.7"/>
  <text x="60" y="64" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">FB</text>
  <line x1="80" y1="60" x2="120" y2="75" stroke="url(#g1)" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <circle cx="55" cy="130" r="20" fill="#161619" stroke="url(#g1)" stroke-width="1" opacity="0.7"/>
  <text x="55" y="134" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">IG</text>
  <line x1="75" y1="130" x2="120" y2="125" stroke="url(#g1)" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- Platform icons - right side -->
  <circle cx="340" cy="60" r="20" fill="#161619" stroke="url(#g1)" stroke-width="1" opacity="0.7"/>
  <text x="340" y="64" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">LI</text>
  <line x1="320" y1="60" x2="280" y2="75" stroke="url(#g1)" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <circle cx="345" cy="130" r="20" fill="#161619" stroke="url(#g1)" stroke-width="1" opacity="0.7"/>
  <text x="345" y="127" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="7" opacity="0.6">Google</text>
  <text x="345" y="137" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="7" opacity="0.6">Biz</text>
  <line x1="325" y1="130" x2="280" y2="125" stroke="url(#g1)" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
