<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Content calendar frame -->
  <rect x="120" y="15" width="160" height="210" rx="14" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="130" y="35" width="140" height="170" rx="6" fill="#0E0E11"/>
  <!-- Post preview 1 -->
  <rect x="140" y="45" width="120" height="65" rx="6" fill="url(#g1)" opacity="0.08"/>
  <rect x="148" y="52" width="40" height="40" rx="4" fill="url(#g1)" opacity="0.15"/>
  <rect x="195" y="55" width="55" height="5" rx="2" fill="url(#g1)" opacity="0.3"/>
  <rect x="195" y="65" width="45" height="4" rx="2" fill="#9CA3AF" opacity="0.2"/>
  <rect x="195" y="74" width="50" height="4" rx="2" fill="#9CA3AF" opacity="0.15"/>
  <rect x="195" y="83" width="35" height="4" rx="2" fill="#9CA3AF" opacity="0.1"/>
  <!-- Post preview 2 -->
  <rect x="140" y="118" width="120" height="40" rx="6" fill="url(#g1)" opacity="0.06"/>
  <rect x="148" y="125" width="25" height="25" rx="4" fill="url(#g1)" opacity="0.12"/>
