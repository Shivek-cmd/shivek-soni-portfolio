<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Calendar frame -->
  <rect x="80" y="30" width="240" height="190" rx="14" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="80" y="30" width="240" height="45" rx="14" fill="url(#g1)" opacity="0.15"/>
  <text x="200" y="58" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.8">March 2026</text>
  <!-- Calendar hangers -->
  <rect x="130" y="22" width="8" height="20" rx="3" fill="url(#g1)" opacity="0.5"/>
  <rect x="262" y="22" width="8" height="20" rx="3" fill="url(#g1)" opacity="0.5"/>
  <!-- Day headers -->
  <text x="112" y="92" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Mon</text>
  <text x="150" y="92" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Tue</text>
  <text x="188" y="92" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Wed</text>
  <text x="226" y="92" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Thu</text>
  <text x="264" y="92" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Fri</text>
  <text x="296" y="92" text-anchor="middle" fill="#6B7280" font-family="sans-serif" font-size="9">Sat</text>
  <!-- Grid of days -->
  <text x="112" y="115" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">1</text>
  <text x="150" y="115" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">2</text>
  <text x="188" y="115" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">3</text>
  <text x="226" y="115" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">4</text>
  <text x="264" y="115" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">5</text>
  <!-- Highlighted appointment days -->
  <circle cx="150" cy="140" r="13" fill="url(#g1)" opacity="0.25"/>
  <text x="150" y="145" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="11" font-weight="bold">9</text>
  <circle cx="226" cy="140" r="13" fill="url(#g1)" opacity="0.4"/>
  <text x="226" y="145" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="11" font-weight="bold">11</text>
  <circle cx="188" cy="170" r="13" fill="url(#g1)" opacity="0.3"/>
  <text x="188" y="175" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="11" font-weight="bold">17</text>
  <!-- Regular days -->
  <text x="112" y="145" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">8</text>
  <text x="188" y="145" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">10</text>
  <text x="264" y="145" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">12</text>
  <text x="112" y="175" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">15</text>
  <text x="150" y="175" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">16</text>
  <text x="226" y="175" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">18</text>
  <text x="264" y="175" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">19</text>
  <!-- Appointment indicator dots -->
  <circle cx="150" cy="153" r="2" fill="url(#g1)" opacity="0.7"/>
  <circle cx="226" cy="153" r="2" fill="url(#g1)" opacity="0.7"/>
  <circle cx="188" cy="183" r="2" fill="url(#g1)" opacity="0.7"/>
</svg>
