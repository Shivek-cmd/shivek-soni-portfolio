<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Central hub -->
  <circle cx="200" cy="120" r="35" fill="#161619" stroke="url(#g1)" stroke-width="2"/>
  <text x="200" y="116" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="9" font-weight="bold" opacity="0.8">API</text>
  <text x="200" y="130" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">Hub</text>
  <!-- Surrounding service nodes -->
  <circle cx="80" cy="60" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="80" y="63" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">Stripe</text>
  <circle cx="320" cy="60" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="320" y="63" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">Zapier</text>
  <circle cx="60" cy="160" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="60" y="163" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">CRM</text>
  <circle cx="340" cy="160" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="340" y="163" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="8" opacity="0.6">Make</text>
  <circle cx="130" cy="210" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="130" y="213" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="7" opacity="0.6">Webhook</text>
  <circle cx="270" cy="210" r="22" fill="#161619" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <text x="270" y="213" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="7" opacity="0.6">PayPal</text>
  <!-- Connection lines -->
  <line x1="100" y1="72" x2="170" y2="100" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="300" y1="72" x2="230" y2="100" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="80" y1="140" x2="168" y2="125" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="320" y1="140" x2="232" y2="125" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="148" y1="200" x2="178" y2="148" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="252" y1="200" x2="222" y2="148" stroke="url(#g1)" stroke-width="1.2" opacity="0.35" stroke-dasharray="4 3"/>
  <!-- Data flow dots -->
  <circle cx="135" cy="86" r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="265" cy="86" r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="124" cy="132" r="3" fill="url(#g1)" opacity="0.5"/>
  <circle cx="276" cy="132" r="3" fill="url(#g1)" opacity="0.5"/>
</svg>
