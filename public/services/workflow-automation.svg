  <circle cx="200" cy="60" r="24" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <circle cx="200" cy="180" r="24" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <circle cx="340" cy="120" r="28" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
