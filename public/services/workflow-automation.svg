  <circle cx="130" cy="88" r="3" fill="url(#g1)" opacity="0.4"/>
  <circle cx="130" cy="152" r="3" fill="url(#g1)" opacity="0.4"/>
  <circle cx="270" cy="88" r="3" fill="url(#g1)" opacity="0.4"/>
