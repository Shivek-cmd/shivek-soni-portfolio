  <path d="M224 62 Q280 60 312 108" stroke="url(#g1)" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
  <path d="M224 178 Q280 180 312 132" stroke="url(#g1)" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
