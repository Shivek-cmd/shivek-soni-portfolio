  <text x="200" y="35" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">If Yes</text>
  <text x="200" y="220" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">If No</text>
  <text x="340" y="165" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="9">Action</text>
