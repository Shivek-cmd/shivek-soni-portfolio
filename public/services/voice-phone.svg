<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Phone handset -->
  <path d="M150 160 Q130 140 125 120 Q120 100 130 80 Q135 70 145 65" stroke="url(#g1)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <circle cx="145" cy="62" r="10" fill="url(#g1)" opacity="0.3"/>
  <circle cx="150" cy="163" r="10" fill="url(#g1)" opacity="0.3"/>
  <!-- Sound waves from earpiece -->
  <path d="M160 55 Q175 50 175 62 Q175 74 160 69" stroke="url(#g1)" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M165 45 Q190 38 190 62 Q190 86 165 79" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M170 35 Q205 25 205 62 Q205 99 170 89" stroke="url(#g1)" stroke-width="0.8" fill="none" opacity="0.2"/>
  <!-- Call tracking dashboard -->
  <rect x="220" y="40" width="150" height="160" rx="12" fill="#161619" stroke="url(#g1)" stroke-width="1.2"/>
  <!-- Dashboard header -->
  <rect x="230" y="50" width="130" height="25" rx="4" fill="url(#g1)" opacity="0.1"/>
  <text x="295" y="66" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="10" opacity="0.7">Call Dashboard</text>
  <!-- Call stats -->
  <rect x="235" y="85" width="55" height="40" rx="6" fill="url(#g1)" opacity="0.08"/>
  <text x="262" y="102" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.7">127</text>
  <text x="262" y="118" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="7">Inbound</text>
  <rect x="300" y="85" width="55" height="40" rx="6" fill="url(#g1)" opacity="0.08"/>
  <text x="327" y="102" text-anchor="middle" fill="url(#g1)" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.7">89</text>
  <text x="327" y="118" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="7">Outbound</text>
  <!-- Call log lines -->
  <rect x="235" y="135" width="120" height="8" rx="3" fill="url(#g1)" opacity="0.12"/>
  <rect x="235" y="150" width="100" height="8" rx="3" fill="url(#g1)" opacity="0.08"/>
  <rect x="235" y="165" width="110" height="8" rx="3" fill="url(#g1)" opacity="0.1"/>
  <rect x="235" y="180" width="90" height="8" rx="3" fill="url(#g1)" opacity="0.06"/>
</svg>
