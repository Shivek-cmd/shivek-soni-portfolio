<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C682"/>
      <stop offset="100%" stop-color="#A8883E"/>
    </linearGradient>
  </defs>
  <!-- Pipeline stages -->
  <rect x="30" y="80" width="70" height="80" rx="12" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <rect x="120" y="65" width="70" height="110" rx="12" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <rect x="210" y="50" width="70" height="140" rx="12" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <rect x="300" y="35" width="70" height="170" rx="12" fill="#161619" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Bar fills -->
  <rect x="38" y="120" width="54" height="32" rx="6" fill="url(#g1)" opacity="0.3"/>
  <rect x="128" y="115" width="54" height="52" rx="6" fill="url(#g1)" opacity="0.4"/>
  <rect x="218" y="100" width="54" height="82" rx="6" fill="url(#g1)" opacity="0.5"/>
  <rect x="308" y="75" width="54" height="122" rx="6" fill="url(#g1)" opacity="0.7"/>
  <!-- Connecting arrows -->
  <path d="M105 120 L115 120" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
  <path d="M195 120 L205 120" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
  <path d="M285 120 L295 120" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
