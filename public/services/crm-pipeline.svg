  <circle cx="65" cy="100" r="8" fill="url(#g1)" opacity="0.6"/>
  <circle cx="55" cy="100" r="3" fill="#FAFAF9" opacity="0.8"/>
  <circle cx="155" cy="85" r="8" fill="url(#g1)" opacity="0.6"/>
  <circle cx="145" cy="85" r="3" fill="#FAFAF9" opacity="0.8"/>
  <circle cx="245" cy="70" r="8" fill="url(#g1)" opacity="0.6"/>
  <circle cx="235" cy="70" r="3" fill="#FAFAF9" opacity="0.8"/>
  <circle cx="335" cy="55" r="8" fill="url(#g1)" opacity="0.6"/>
  <circle cx="325" cy="55" r="3" fill="#FAFAF9" opacity="0.8"/>
  <!-- Labels -->
  <text x="65" y="225" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10">Leads</text>
  <text x="155" y="225" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10">Qualified</text>
  <text x="245" y="225" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10">Proposal</text>
  <text x="335" y="225" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10">Won</text>
